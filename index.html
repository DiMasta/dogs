<!doctype html>
<html lang="bg">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Породи кучета</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="stage" id="stage" role="button" tabindex="0" aria-label="Покажи следващото куче">
        <div class="name" id="name" aria-live="polite"></div>
        <div class="image-wrap">
            <img id="dog" alt="" decoding="async" />
        </div>
    </main>
    <nav class="controls" id="controls" aria-label="Управление">
        <button type="button" id="prev" class="ctrl" aria-label="Предишно куче">←</button>
        <button type="button" id="restart" class="ctrl" aria-label="Започни отначало">↺</button>
        <button type="button" id="next" class="ctrl" aria-label="Следващо куче">→</button>
    </nav>
    <script src="app.js"></script>
</body>
</html>
